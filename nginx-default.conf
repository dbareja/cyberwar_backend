# Main domain: cyberwar.co.in
server {
    listen 80;
    server_name cyberwar.co.in www.cyberwar.co.in;
    
    # API requests - proxy to backend on port 5005
    location /api {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://localhost:5005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        
        # Handle preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # All other requests - serve static frontend files
    location / {
        root /var/www/cyberwar-frontend/dist;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
}

# Subdomain: apiservice.cyberwar.co.in (existing config)
server {
    listen 80;
    server_name apiservice.cyberwar.co.in;
    
    # CORS headers for all responses
    add_header 'Access-Control-Allow-Origin' 'https://cyberwar.co.in' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Max-Age' '86400' always;
    
    location / {
        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://cyberwar.co.in' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Content-Length' '0';
            return 204;
        }
        
        # Proxy to Node.js app
        proxy_pass http://localhost:5005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Static files for uploads (if needed)
    location /uploads {
        alias /var/www/cyberwar-backend/uploads;
        try_files $uri $uri/ =404;
        
        add_header 'Access-Control-Allow-Origin' 'https://cyberwar.co.in' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }
}

